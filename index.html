<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Market Heatmap — Sectors & Indexes</title>
<style>
  :root {
    --bg-primary:   #080c14;
    --bg-secondary: #0d1424;
    --bg-card:      #111827;
    --border:       #1e2d3d;
    --border-bright:#2a3f5c;
    --text-primary: #e2e8f4;
    --text-sec:     #8892a4;
    --text-muted:   #475569;
    --cyan:         #22d3ee;
    --font: 'Courier New', monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--bg-primary);color:var(--text-primary);font-family:var(--font);font-size:13px;}
  body{display:flex;flex-direction:column;min-height:100vh;}

  /* Header */
  #header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--bg-secondary);border-bottom:1px solid var(--border);flex-shrink:0;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-text{font-size:15px;font-weight:bold;letter-spacing:2px;color:var(--cyan);}
  #header-right{display:flex;align-items:center;gap:16px;font-size:11px;color:var(--text-sec);}
  .live-dot{width:7px;height:7px;border-radius:50%;background:#10d488;display:inline-block;animation:pulse 1.5s infinite;margin-right:4px;}
  .live-dot.offline{background:#f04155;animation:none;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  #market-status{padding:2px 8px;border-radius:3px;font-size:10px;font-weight:bold;letter-spacing:1px;}
  #market-status.open{background:rgba(16,212,136,.15);color:#10d488;border:1px solid #0d9e66;}
  #market-status.closed{background:rgba(240,65,85,.12);color:#f04155;border:1px solid #b0293a;}

  /* Index strip */
  #index-strip{display:flex;gap:1px;background:var(--border);overflow-x:auto;flex-shrink:0;}
  .idx-tile{flex:1;min-width:110px;background:var(--bg-card);padding:8px 14px;display:flex;flex-direction:column;gap:2px;}
  .idx-sym{font-size:10px;color:var(--text-muted);letter-spacing:1px;}
  .idx-price{font-size:15px;font-weight:bold;}
  .idx-chg{font-size:11px;font-weight:bold;}
  .idx-chg.up{color:#10d488;}
  .idx-chg.down{color:#f04155;}

  /* Controls */
  #controls{display:flex;align-items:center;gap:14px;padding:8px 16px;background:var(--bg-secondary);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
  .ctrl-btn{padding:3px 10px;border-radius:3px;border:1px solid var(--border-bright);background:transparent;color:var(--text-sec);font-family:var(--font);font-size:10px;cursor:pointer;letter-spacing:.5px;}
  .ctrl-btn:hover{border-color:var(--cyan);color:var(--cyan);}
  .ctrl-btn.active{border-color:var(--cyan);background:rgba(34,211,238,.12);color:var(--cyan);}
  #refresh-btn{margin-left:auto;padding:4px 14px;border-radius:3px;border:1px solid var(--border-bright);background:transparent;color:var(--text-sec);font-family:var(--font);font-size:10px;cursor:pointer;}
  #refresh-btn:hover{border-color:#10d488;color:#10d488;}
  #countdown{font-size:10px;color:var(--text-muted);}

  /* Treemap */
  #treemap-wrap{flex:1;position:relative;padding:10px;overflow:hidden;}
  #treemap{position:relative;width:100%;height:100%;}
  .tile{position:absolute;border:1px solid rgba(0,0,0,.4);border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;transition:filter .15s;cursor:default;}
  .tile:hover{filter:brightness(1.25);z-index:5;box-shadow:0 0 0 2px var(--cyan);}
  .tile-sym{font-weight:bold;letter-spacing:.5px;text-shadow:0 1px 2px rgba(0,0,0,.6);}
  .tile-chg{font-weight:bold;text-shadow:0 1px 2px rgba(0,0,0,.6);}
  .tile-name{font-size:9px;opacity:.85;text-shadow:0 1px 2px rgba(0,0,0,.6);}

  /* Legend */
  #legend{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--bg-secondary);border-top:1px solid var(--border);flex-shrink:0;font-size:10px;color:var(--text-sec);}
  #legend-bar{width:200px;height:10px;border-radius:2px;background:linear-gradient(90deg,#7f1d2b,#f04155,#3a2530,#0d9e66,#10d488);}

  /* Tooltip */
  #tooltip{position:fixed;background:var(--bg-card);border:1px solid var(--border-bright);border-radius:5px;padding:8px 12px;font-size:10px;pointer-events:none;z-index:200;display:none;line-height:1.8;min-width:160px;}
  #tooltip .tt-sym{font-size:13px;font-weight:bold;margin-bottom:4px;}
  #tooltip .tt-row{display:flex;justify-content:space-between;gap:16px;}
  #tooltip .tt-label{color:var(--text-muted);}

  /* Overlay */
  #overlay{position:fixed;inset:0;background:rgba(8,12,20,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100;}
  #overlay.hidden{display:none;}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #overlay-msg{color:var(--text-sec);font-size:12px;letter-spacing:1px;}
  #error-box{background:rgba(240,65,85,.1);border:1px solid #b0293a;border-radius:6px;padding:16px 24px;max-width:520px;text-align:center;color:#f04155;font-size:11px;line-height:1.7;}
  #error-box .err-title{font-size:14px;margin-bottom:8px;letter-spacing:1px;}
  #error-retry,#error-demo{margin-top:10px;margin-right:8px;padding:6px 20px;border-radius:3px;border:1px solid #b0293a;background:transparent;color:#f04155;font-family:var(--font);cursor:pointer;font-size:11px;}
  #error-retry:hover,#error-demo:hover{background:rgba(240,65,85,.15);}
</style>
</head>
<body>

<div id="overlay">

  <div id="error-box" style="display:none">
    <div class="err-title">⚠ CONNECTION ERROR</div>

    <button id="error-demo" onclick="startDemo()">USE DEMO DATA</button>
  </div>
</div>

<div id="tooltip"></div>

<div id="header">
  <div class="brand">
    <span class="brand-text">⬛ MARKET · HEATMAP</span>
  </div>
  <div id="header-right">
    <div><span class="live-dot" id="live-dot"></span><span id="live-label">LIVE</span></div>

</div>

<div id="index-strip"></div>

<div id="controls">
  <span style="font-size:9px;letter-spacing:1px;color:var(--text-muted);">VIEW</span>
  <button class="ctrl-btn active" data-view="sector">SECTORS</button>
  <button class="ctrl-btn" data-view="index">INDEXES</button>
  <span style="font-size:9px;letter-spacing:1px;color:var(--text-muted);margin-left:10px;">SIZE BY</span>
  <button class="ctrl-btn active" data-size="weight">WEIGHT</button>

<div id="treemap-wrap"><div id="treemap"></div></div>

<div id="legend">
  <span>-3%</span><div id="legend-bar"></div><span>+3%</span>
  <span style="margin-left:20px;color:var(--text-muted);">Tile size = approx S&P 500 sector weight</span>

// ─── Clock / Market hours ───────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  $('clock').textContent = now.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'America/New_York'}) + ' ET';
  const day = now.toLocaleDateString('en-US',{weekday:'short',timeZone:'America/New_York'});
  const et = new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
  const h=et.getHours(), m=et.getMinutes();
  const isWeekday = !['Sat','Sun'].includes(day);
  const isOpen = isWeekday && (h>9||(h===9&&m>=30)) && h<16;
  $('market-status').textContent = isOpen ? 'MARKET OPEN' : 'MARKET CLOSED';
  $('market-status').className = isOpen ? 'open' : 'closed';
  $('live-dot').className = isOpen ? 'live-dot' : 'live-dot offline';
}
setInterval(updateClock,1000); updateClock();

// ─── Auth ────────────────────────────────────────────────────────────────────
async function getAccessToken() {
  if (TT_REFRESH_TOKEN === "PASTE_YOUR_REFRESH_TOKEN_HERE") {
    throw new Error("No refresh token configured. Complete the OAuth flow and paste your refresh token into the CONFIG section of this file.");
  }
  const res = await fetch(TT_TOKEN_URL, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({
      grant_type: "refresh_token",
      refresh_token: TT_REFRESH_TOKEN,
      client_id: TT_CLIENT_ID,
      client_secret: TT_CLIENT_SECRET,
    }),
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Auth failed (${res.status}): ${txt.slice(0,200)}`);
  }
  const data = await res.json();
  return data.access_token;
}

// ─── Quotes ──────────────────────────────────────────────────────────────────
async function fetchQuotes(symbols) {
  const url = `${TT_QUOTES_URL}?equity=${symbols.join(',')}`;
  const res = await fetch(url, {
    headers: { "Authorization": `Bearer ${state.accessToken}` },
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Quotes failed (${res.status}): ${txt.slice(0,200)}`);
  }
  const data = await res.json();
  const items = data.data?.items || data.items || [];
  const map = {};
  for (const item of items) {
    const last = parseFloat(item.last || item.close || item.mark || 0);
    const prevClose = parseFloat(item['prev-close'] || item.prevClose || item['closing-price'] || 0);
    const pctChange = prevClose ? ((last - prevClose) / prevClose) * 100 : (item['percent-change'] ? parseFloat(item['percent-change']) : 0);
    map[item.symbol] = { last, pctChange: parseFloat(pctChange.toFixed(2)), volume: item.volume || 0 };
  }
  return map;
}

// ─── Init / Refresh cycle ────────────────────────────────────────────────────
async function init() {
  showLoading('CONNECTING TO TASTYTRADE...');
  try {
    state.accessToken = await getAccessToken();
    await refreshAll();
    hideOverlay();
    resetCountdown();
  } catch (err) {
    showError(err.message);
  }
}

async function refreshAll() {
  const allSymbols = [...new Set([...SECTORS.map(s=>s.sym), ...INDEXES.map(s=>s.sym)])];
  const quotes = await fetchQuotes(allSymbols);
  renderIndexStrip(quotes);
  renderTreemap(quotes);
  $('overlay-msg').textContent = '';
}

// ─── Demo Mode (fallback if no credentials / API blocked) ───────────────────
function startDemo() {
  state.demo = true;
  hideOverlay();
  const generate = () => {
    const quotes = {};
    for (const s of [...SECTORS, ...INDEXES]) {
      const pct = (Math.random() - 0.5) * 4;
      quotes[s.sym] = { last: 50 + Math.random()*400, pctChange: parseFloat(pct.toFixed(2)), volume: Math.round(Math.random()*5e6) };
    }
    renderIndexStrip(quotes);
    renderTreemap(quotes);
  };
  generate();
  setInterval(generate, state.intervalSeconds*1000);
  resetCountdown();
}
window.startDemo = startDemo;

// ─── Index Strip ─────────────────────────────────────────────────────────────
function renderIndexStrip(quotes) {
  const strip = $('index-strip');
  strip.innerHTML = INDEXES.map(idx => {
    const q = quotes[idx.sym] || { last: 0, pctChange: 0 };
    const cls = q.pctChange >= 0 ? 'up' : 'down';
    const sign = q.pctChange >= 0 ? '+' : '';
    return `<div class="idx-tile">
      <div class="idx-sym">${idx.sym} · ${idx.name}</div>
      <div class="idx-price">${q.last.toFixed(2)}</div>
      <div class="idx-chg ${cls}">${sign}${q.pctChange.toFixed(2)}%</div>
    </div>`;
  }).join('');
}

// ─── Color scale: red (-3%) → gray (0%) → green (+3%) ───────────────────────
function colorForChange(pct) {
  const clamped = Math.max(-3, Math.min(3, pct));
  const t = (clamped + 3) / 6; // 0..1
  let r,g,b;
  if (t < 0.5) {
    const k = t / 0.5;
    r = lerp(0x7f,0x3a,k); g = lerp(0x1d,0x25,k); b = lerp(0x2b,0x30,k);
  } else {
    const k = (t - 0.5) / 0.5;
    r = lerp(0x3a,0x0d,k); g = lerp(0x25,0xd4,k); b = lerp(0x30,0x88,k);
  }
  return `rgb(${r|0},${g|0},${b|0})`;
}
function lerp(a,b,t){ return a + (b-a)*t; }

// ─── Simple squarified treemap layout ────────────────────────────────────────
function squarify(items, x, y, w, h, out) {
  if (!items.length) return;
  if (items.length === 1) {
    out.push({ ...items[0], x, y, w, h });
    return;
  }
  const total = items.reduce((s,i)=>s+i.value,0);
  let acc = 0, splitIdx = 1;
  const targetRatio = w >= h ? w/h : h/w;
  // Greedy split: find point where row aspect worsens
  let bestScore = Infinity;
  for (let i=1;i<items.length;i++){
    const rowSum = items.slice(0,i).reduce((s,it)=>s+it.value,0);
    const rowFrac = rowSum/total;
    const rowShort = w>=h ? h*rowFrac : w*rowFrac;
    const rowLong  = w>=h ? w : h;
    const rowItems = items.slice(0,i);
    const worst = Math.max(...rowItems.map(it=>{
      const itemLen = (it.value/rowSum) * rowLong;
      const ratio = Math.max(itemLen/rowShort, rowShort/itemLen);
      return ratio;
    }));
    if (worst < bestScore) { bestScore = worst; splitIdx = i; } else break;
  }
  const row = items.slice(0,splitIdx);
  const rest = items.slice(splitIdx);
  const rowSum = row.reduce((s,i)=>s+i.value,0);
  const rowFrac = rowSum/total;

  if (w >= h) {
    const rowW = w*rowFrac;
    let cy=y;
    for (const it of row) {
      const itemH = (it.value/rowSum)*h;
      out.push({...it, x, y:cy, w:rowW, h:itemH});
      cy+=itemH;
    }
    squarify(rest, x+rowW, y, w-rowW, h, out);
  } else {
    const rowH = h*rowFrac;
    let cx=x;
    for (const it of row) {
      const itemW = (it.value/rowSum)*w;
      out.push({...it, x:cx, y, w:itemW, h:rowH});
      cx+=itemW;
    }
    squarify(rest, x, y+rowH, w, h-rowH, out);
  }
}

// ─── Render Treemap ───────────────────────────────────────────────────────────
function renderTreemap(quotes) {
  const container = $('treemap');
  const wrap = $('treemap-wrap');
  const W = wrap.clientWidth - 20;
  const H = wrap.clientHeight - 20;

  const source = state.view === 'sector' ? SECTORS : INDEXES;
  const items = source.map(s => ({
    sym: s.sym, name: s.name,
    value: state.sizeMode === 'weight' ? s.weight : 1,
    quote: quotes[s.sym] || { last:0, pctChange:0, volume:0 },
  })).sort((a,b) => b.value - a.value);

  const laidOut = [];
  squarify(items, 0, 0, W, H, laidOut);

  container.innerHTML = laidOut.map(t => {
    const pct = t.quote.pctChange;
    const bg = colorForChange(pct);
    const sign = pct >= 0 ? '+' : '';
    const fontScale = Math.min(t.w, t.h);
    const symSize = Math.max(11, Math.min(22, fontScale/6));
    const chgSize = Math.max(10, Math.min(18, fontScale/8));
    const showName = t.w > 90 && t.h > 50;
    return `<div class="tile"
        style="left:${t.x}px;top:${t.y}px;width:${t.w-2}px;height:${t.h-2}px;background:${bg};"
        data-sym="${t.sym}" data-price="${t.quote.last}" data-pct="${pct}" data-vol="${t.quote.volume}"
        onmouseenter="showTip(event,this)" onmouseleave="hideTip()">
      <div class="tile-sym" style="font-size:${symSize}px">${t.sym}</div>
      <div class="tile-chg" style="font-size:${chgSize}px">${sign}${pct.toFixed(2)}%</div>
      ${showName ? `<div class="tile-name">${t.name}</div>` : ''}
    </div>`;
  }).join('');
}

// ─── Tooltip ─────────────────────────────────────────────────────────────────
const tooltip = $('tooltip');
function showTip(e, el) {
  const sym = el.dataset.sym, price = parseFloat(el.dataset.price), pct = parseFloat(el.dataset.pct), vol = parseInt(el.dataset.vol);
  tooltip.innerHTML = `
    <div class="tt-sym">${sym}</div>
    <div class="tt-row"><span class="tt-label">Price</span><span>$${price.toFixed(2)}</span></div>
    <div class="tt-row"><span class="tt-label">Change</span><span style="color:${pct>=0?'#10d488':'#f04155'}">${pct>=0?'+':''}${pct.toFixed(2)}%</span></div>
    <div class="tt-row"><span class="tt-label">Volume</span><span>${vol.toLocaleString()}</span></div>`;
  tooltip.style.display='block';
  positionTip(e);
}
function hideTip(){ tooltip.style.display='none'; }
function positionTip(e){
  const x=e.clientX+12, y=e.clientY-20;
  tooltip.style.left = (x+tooltip.offsetWidth>window.innerWidth ? x-tooltip.offsetWidth-24 : x)+'px';
  tooltip.style.top = Math.max(0,y)+'px';
}
document.addEventListener('mousemove', e => { if(tooltip.style.display!=='none') positionTip(e); });
window.showTip = showTip; window.hideTip = hideTip;

// ─── UI States ───────────────────────────────────────────────────────────────
function showLoading(msg){ $('overlay').classList.remove('hidden'); $('spinner').style.display='block'; $('overlay-msg').textContent=msg; $('error-box').style.display='none'; }
function showError(msg){ $('overlay').classList.remove('hidden'); $('spinner').style.display='none'; $('overlay-msg').textContent=''; $('error-box').style.display='block'; $('error-detail').textContent=msg; }
function hideOverlay(){ $('overlay').classList.add('hidden'); }
window.init = init;

  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.ctrl-btn[data-size]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.sizeMode = btn.dataset.size;
    if (state.lastQuotes) renderTreemap(state.lastQuotes);
  });
});
document.querySelectorAll('.ctrl-btn[data-interval]').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.ctrl-btn[data-interval]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.intervalSeconds = parseInt(btn.dataset.interval);
    resetCountdown();
  });
});
$('refresh-btn').addEventListener('click', () => state.demo ? null : refreshAll().catch(e=>showError(e.message)));

function refreshOrDemo(){ state.demo ? null : refreshAll().catch(e=>showError(e.message)); }

// ─── Countdown / Auto-refresh ────────────────────────────────────────────────
function resetCountdown() {
  clearInterval(state.countdownTimer);
  state.countdown = state.intervalSeconds;
  updateCountdown();
  state.countdownTimer = setInterval(()=>{
    state.countdown--;
    updateCountdown();
    if (state.countdown<=0) {
      state.countdown = state.intervalSeconds;
      if (!state.demo) refreshAll().catch(e=>showError(e.message));
    }
  },1000);
}
function updateCountdown(){ $('countdown').textContent = `Refresh in ${state.countdown}s`; }

// Store last quotes for view switching
const _origRenderTreemap = renderTreemap;
renderTreemap = function(quotes){ state.lastQuotes = quotes; _origRenderTreemap(quotes); };

window.addEventListener('resize', () => { if (state.lastQuotes) renderTreemap(state.lastQuotes); });

// ─── Boot ────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
