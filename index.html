<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Market Heatmap — Sectors & Indexes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary:   #000000;
    --bg-secondary: #0a0a0c;
    --bg-card:      #121214;
    --bg-elevated:  #18181b;
    --border:       #232326;
    --border-bright:#333338;
    --text-primary: #f5f5f7;
    --text-sec:     #9a9aa2;
    --text-muted:   #55555c;
    --accent:       #3b82f6;
    --green:        #00d68f;
    --green-dim:    #00a870;
    --red:          #ff4757;
    --red-dim:      #d63847;
    --font: 'Inter', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--bg-primary);color:var(--text-primary);font-family:var(--font);font-size:13px;-webkit-font-smoothing:antialiased;}
  body{display:flex;flex-direction:column;min-height:100vh;}

  /* Ticker Tape */
  #ticker-wrap{background:#000;border-bottom:1px solid var(--border);overflow:hidden;flex-shrink:0;position:relative;height:38px;}
  #ticker-wrap::before,#ticker-wrap::after{content:'';position:absolute;top:0;bottom:0;width:40px;z-index:2;pointer-events:none;}
  #ticker-wrap::before{left:0;background:linear-gradient(90deg,#000 20%,transparent);}
  #ticker-wrap::after{right:0;background:linear-gradient(270deg,#000 20%,transparent);}
  #ticker-track{display:flex;align-items:center;height:100%;white-space:nowrap;animation:ticker-scroll 60s linear infinite;width:max-content;}
  #ticker-track:hover{animation-play-state:paused;}
  @keyframes ticker-scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  .ticker-item{display:inline-flex;align-items:center;gap:7px;padding:0 20px;font-family:var(--font-mono);font-size:12px;border-right:1px solid var(--border);}
  .ticker-sym{font-weight:700;color:var(--text-primary);letter-spacing:.3px;}
  .ticker-price{color:var(--text-sec);}
  .ticker-chg{font-weight:600;display:flex;align-items:center;gap:2px;}
  .ticker-chg.up{color:var(--green);}
  .ticker-chg.down{color:var(--red);}
  .ticker-arrow{font-size:9px;}

  /* Header */
  #header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(10,10,12,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-shrink:0;position:sticky;top:0;z-index:50;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-text{font-size:16px;font-weight:800;letter-spacing:-.3px;color:var(--text-primary);}
  .brand-text .accent-dot{color:var(--accent);}
  #header-right{display:flex;align-items:center;gap:18px;font-size:11px;color:var(--text-sec);font-family:var(--font-mono);}
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 1.5s infinite;margin-right:5px;box-shadow:0 0 8px var(--green);}
  .live-dot.offline{background:var(--red);animation:none;box-shadow:0 0 8px var(--red);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  #market-status{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;}
  #market-status.open{background:rgba(0,214,143,.12);color:var(--green);}
  #market-status.closed{background:rgba(255,71,87,.1);color:var(--red);}

  /* Index strip */
  #index-strip{display:flex;gap:1px;background:var(--border);overflow-x:auto;flex-shrink:0;}
  .idx-tile{flex:1;min-width:130px;background:var(--bg-card);padding:12px 18px;display:flex;flex-direction:column;gap:4px;transition:background .15s;}
  .idx-tile:hover{background:var(--bg-elevated);}
  .idx-sym{font-size:10px;color:var(--text-muted);letter-spacing:.8px;font-weight:600;text-transform:uppercase;}
  .idx-price{font-size:18px;font-weight:700;font-family:var(--font-mono);letter-spacing:-.3px;}
  .idx-chg{font-size:12px;font-weight:600;font-family:var(--font-mono);}
  .idx-chg.up{color:var(--green);}
  .idx-chg.down{color:var(--red);}

  /* Controls */
  #controls{display:flex;align-items:center;gap:10px;padding:12px 24px;background:var(--bg-secondary);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
  .ctrl-label{font-size:10px;letter-spacing:1px;color:var(--text-muted);font-weight:600;text-transform:uppercase;}
  .ctrl-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-sec);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;letter-spacing:.2px;transition:all .15s;}
  .ctrl-btn:hover{border-color:var(--border-bright);color:var(--text-primary);}
  .ctrl-btn.active{border-color:var(--accent);background:rgba(59,130,246,.12);color:var(--accent);}
  #refresh-btn{margin-left:auto;padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-sec);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
  #refresh-btn:hover{border-color:var(--green);color:var(--green);}
  #countdown{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);}

  /* Treemap */
  #treemap-wrap{flex:1;position:relative;padding:16px;overflow:hidden;background:var(--bg-primary);}
  #treemap{position:relative;width:100%;height:100%;}
  .tile{position:absolute;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;transition:filter .15s,transform .15s;cursor:default;box-shadow:0 1px 3px rgba(0,0,0,.4);}
  .tile:hover{filter:brightness(1.2);z-index:5;transform:scale(1.015);box-shadow:0 4px 20px rgba(0,0,0,.5);}
  .tile-sym{font-weight:800;letter-spacing:.2px;font-family:var(--font-mono);}
  .tile-chg{font-weight:700;font-family:var(--font-mono);}
  .tile-name{font-size:9px;opacity:.8;font-weight:500;}
  .tile-chart{margin-top:6px;opacity:.9;pointer-events:none;}
  .tile-bias{margin-top:5px;padding:2px 8px;border-radius:20px;font-size:8px;font-weight:700;letter-spacing:.4px;font-family:var(--font-mono);}
  .tile-bias.bias-bull{background:rgba(0,214,143,.18);color:#4dffc0;}
  .tile-bias.bias-bear{background:rgba(255,71,87,.18);color:#ff8a94;}
  .tile-bias.bias-neutral{background:rgba(255,255,255,.1);color:#c8c8d0;}

  /* Volume Spike Alerts (bottom-left popup stack) */
  #volume-alerts{position:fixed;bottom:66px;left:20px;z-index:150;display:flex;flex-direction:column-reverse;gap:8px;max-width:320px;}
  .vol-alert{display:flex;align-items:center;gap:10px;background:var(--bg-elevated);border:1px solid var(--border-bright);border-left:3px solid #ffb020;border-radius:10px;padding:10px 12px;box-shadow:0 8px 30px rgba(0,0,0,.6);animation:slide-in .25s ease;}
  .vol-alert.fade-out{animation:fade-out .3s ease forwards;}
  @keyframes slide-in{from{opacity:0;transform:translateX(-16px);}to{opacity:1;transform:translateX(0);}}
  @keyframes fade-out{to{opacity:0;transform:translateX(-16px);}}
  .va-icon{font-size:16px;flex-shrink:0;}
  .va-body{flex:1;min-width:0;}
  .va-title{font-size:12px;font-weight:700;font-family:var(--font-mono);letter-spacing:.2px;}
  .va-title .va-mult{color:#ffb020;}
  .va-sub{font-size:10px;color:var(--text-sec);margin-top:2px;}
  .va-sub .up{color:var(--green);font-weight:600;}
  .va-sub .down{color:var(--red);font-weight:600;}
  .va-close{background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;flex-shrink:0;line-height:1;padding:0 2px;}
  .va-close:hover{color:var(--text-primary);}

  /* Alert History Toggle + Panel (bottom-left, above the live alert stack) */
  #history-toggle{position:fixed;bottom:20px;left:20px;z-index:151;display:flex;align-items:center;gap:6px;padding:9px 14px;border-radius:24px;border:1px solid var(--border-bright);background:var(--bg-elevated);color:var(--text-sec);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;box-shadow:0 6px 24px rgba(0,0,0,.5);transition:all .15s;}
  #history-toggle:hover{border-color:var(--accent);color:var(--text-primary);}
  #history-badge{display:none;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 4px;border-radius:10px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;font-family:var(--font-mono);}

  #history-panel{position:fixed;bottom:66px;left:20px;width:300px;max-height:400px;background:var(--bg-elevated);border:1px solid var(--border-bright);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.6);z-index:151;display:flex;flex-direction:column;opacity:0;pointer-events:none;transform:translateY(8px);transition:all .2s ease;overflow:hidden;}
  #history-panel.open{opacity:1;pointer-events:auto;transform:translateY(0);}
  #history-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;letter-spacing:.3px;color:var(--text-primary);}
  #history-header button{background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;line-height:1;}
  #history-header button:hover{color:var(--text-primary);}
  #history-list{overflow-y:auto;padding:6px;}
  #history-list::-webkit-scrollbar{width:4px;}
  #history-list::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:2px;}
  .history-empty{padding:24px 14px;text-align:center;color:var(--text-muted);font-size:11px;}
  .history-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;transition:background .15s;}
  .history-item:hover{background:rgba(255,255,255,.04);}
  .hi-left{display:flex;align-items:center;gap:8px;}
  .hi-sym{font-family:var(--font-mono);font-weight:700;font-size:12px;}
  .hi-mult{font-family:var(--font-mono);font-size:10px;color:#ffb020;font-weight:600;}
  .hi-right{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
  .hi-pct{font-family:var(--font-mono);font-size:10px;font-weight:600;}
  .hi-pct.up{color:var(--green);}
  .hi-pct.down{color:var(--red);}
  .hi-time{font-size:9px;color:var(--text-muted);font-family:var(--font-mono);}

  /* Legend */
  #legend{display:flex;align-items:center;gap:10px;padding:10px 24px;background:var(--bg-secondary);border-top:1px solid var(--border);flex-shrink:0;font-size:10px;color:var(--text-sec);font-family:var(--font-mono);}
  #legend-bar{width:200px;height:8px;border-radius:4px;background:linear-gradient(90deg,#8b1e2e,#ff4757,#232326,#00a870,#00d68f);}

  /* Tooltip */
  #tooltip{position:fixed;background:var(--bg-elevated);border:1px solid var(--border-bright);border-radius:10px;padding:12px 16px;font-size:11px;pointer-events:none;z-index:200;display:none;line-height:1.9;min-width:170px;box-shadow:0 8px 30px rgba(0,0,0,.5);font-family:var(--font-mono);}
  #tooltip .tt-sym{font-size:14px;font-weight:700;margin-bottom:4px;font-family:var(--font);}
  #tooltip .tt-row{display:flex;justify-content:space-between;gap:16px;}
  #tooltip .tt-label{color:var(--text-muted);}

  /* Overlay */
  #overlay{position:fixed;inset:0;background:rgba(0,0,0,.94);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100;}
  #overlay.hidden{display:none;}
  .spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #overlay-msg{color:var(--text-sec);font-size:12px;letter-spacing:.5px;font-family:var(--font-mono);}
  #error-box{background:rgba(255,71,87,.08);border:1px solid var(--red-dim);border-radius:12px;padding:20px 28px;max-width:520px;text-align:center;color:var(--red);font-size:11px;line-height:1.7;}
  #error-box .err-title{font-size:14px;margin-bottom:8px;letter-spacing:.5px;font-weight:700;}
  #error-retry,#error-demo{margin-top:12px;margin-right:8px;padding:8px 22px;border-radius:8px;border:1px solid var(--red-dim);background:transparent;color:var(--red);font-family:var(--font);font-weight:600;cursor:pointer;font-size:11px;transition:all .15s;}
  #error-retry:hover,#error-demo:hover{background:rgba(255,71,87,.12);}
</style>
</head>

<div id="overlay">
  <div class="spinner" id="spinner"></div>

<div id="tooltip"></div>

<button id="history-toggle" onclick="toggleHistory()">

<div id="history-panel">

<div id="ticker-wrap"><div id="ticker-track"></div></div>

<div id="header">

<div id="treemap-wrap"><div id="treemap"></div></div>

<div id="legend">
  <span>-3%</span><div id="legend-bar"></div><span>+3%</span>
  <span style="margin-left:20px;color:var(--text-muted);">Tile size = approx S&P 500 sector weight</span>
</div>

<script>
// ─── CONFIG — Fill in your TastyTrade credentials ─────────────────────────
const TT_CLIENT_ID     = "4c3ae6bf-4c1a-4efd-87e8-150a9789d414";
const TT_CLIENT_SECRET = "86589ec2aee9df1fc66b7738b3eba9f67b00eb82";
const TT_REFRESH_TOKEN = "eyJhbGciOiJFZERTQSIsInR5cCI6InJ0K2p3dCIsImtpZCI6InJRTFV6b0FTWnNnV0ZoSE42V1huNm9vOHhMUlJrMW41X0ZJdDZTdWo0UXMiLCJqa3UiOiJodHRwczovL2FwaS50YXN0eXRyYWRlLmNvbS9vYXV0aC9qd2tzIn0.eyJpc3MiOiJodHRwczovL2FwaS50YXN0eXRyYWRlLmNvbSIsInN1YiI6IlU5MjQ3MzNhYS01ZjcwLTQ1M2EtYWFiOS05NTVhZTMwMmQwNWIiLCJpYXQiOjE3ODM1Nzc2MzksImF1ZCI6IjRjM2FlNmJmLTRjMWEtNGVmZC04N2U4LTE1MGE5Nzg5ZDQxNCIsImdyYW50X2lkIjoiR2RjN2QxN2M5LTEyNjEtNGE0Zi1hOTBjLTA5NzE2M2I1ZTQ0NyIsInNjb3BlIjoicmVhZCJ9.Lh-ESl3sDVx50c3b-GNF9cXatya5Lt2DIzJ-B04D28Cyp7F2FHxUnuH5PRoHOUW_Y1yXROxRvttuS_dgTGQSAQ";

const TT_TOKEN_URL  = "https://api.tastyworks.com/oauth/token";
const TT_QUOTES_URL = "https://api.tastyworks.com/market-data/by-type";

// ─── Reference Data ─────────────────────────────────────────────────────────
// Sectors: symbol, name, approximate S&P 500 sector weight (%)
const SECTORS = [
  { sym: "XLK",  name: "Technology",             weight: 30.0 },
  { sym: "XLF",  name: "Financials",              weight: 13.0 },
  { sym: "XLV",  name: "Health Care",             weight: 11.0 },
  { sym: "XLY",  name: "Consumer Discretionary",  weight: 10.5 },
  { sym: "XLC",  name: "Communication Services",  weight: 9.0  },
  { sym: "XLI",  name: "Industrials",             weight: 8.0  },
  { sym: "XLP",  name: "Consumer Staples",        weight: 6.0  },
  { sym: "XLE",  name: "Energy",                  weight: 3.5  },
  { sym: "XLU",  name: "Utilities",               weight: 2.5  },
  { sym: "XLRE", name: "Real Estate",             weight: 2.2  },
  { sym: "XLB",  name: "Materials",               weight: 2.0  },
];

// Major indexes shown in the top strip + Index view
const INDEXES = [
  { sym: "SPY", name: "S&P 500",     weight: 40 },
  { sym: "QQQ", name: "Nasdaq 100",  weight: 25 },
  { sym: "DIA", name: "Dow Jones",   weight: 15 },
  { sym: "IWM", name: "Russell 2000",weight: 12 },
  { sym: "MDY", name: "S&P MidCap",  weight: 8  },
];

// Top stocks shown in the scrolling ticker tape (CNBC-style)
const TICKER_STOCKS = [
  "AAPL","MSFT","NVDA","GOOGL","AMZN","META","TSLA","AVGO","BRK.B","LLY",
  "JPM","V","XOM","UNH","MA","COST","HD","PG","NFLX","JNJ",
  "CRM","BAC","ABBV","ORCL","MRK","CVX","KO","AMD","PEP","WMT",
];

// ─── State ───────────────────────────────────────────────────────────────────
const state = {
  accessToken: null,
  view: 'sector',
  sizeMode: 'weight',
  intervalSeconds: 30,
  countdownTimer: null,
  countdown: 0,
  demo: false,
  history: {},       // { SYM: [{t, p}, ...] } — rolling 1hr price window
  volDeltas: {},      // { SYM: [{t, delta}, ...] } — recent volume-per-interval samples
  lastVolume: {},     // { SYM: cumulativeVolumeAtLastPoll }
  activeAlerts: [],
  alertHistory: [], // up to 30 most recent spike records, newest first
  historyOpen: false,
};

const ONE_HOUR_MS = 60 * 60 * 1000;
const VOL_SPIKE_MULTIPLIER = 2.8;  // flag if interval volume > 2.8x its recent average
const VOL_BASELINE_SAMPLES = 8;    // how many past intervals to average for baseline

function recordHistory(quotes) {
  const now = Date.now();
  const trackedSymbols = [...new Set([...SECTORS.map(s=>s.sym), ...INDEXES.map(s=>s.sym)])];
  for (const sym of trackedSymbols) {
    const q = quotes[sym];
    if (!q || !q.last) continue;
    if (!state.history[sym]) state.history[sym] = [];
    state.history[sym].push({ t: now, p: q.last });
    state.history[sym] = state.history[sym].filter(pt => now - pt.t <= ONE_HOUR_MS);
  }
}

// ─── Volume Spike Detection ──────────────────────────────────────────────────
// Tracks per-interval volume (delta between polls) and flags spikes vs recent baseline
function detectVolumeSpikes(quotes) {
  const trackedSymbols = [...new Set([...SECTORS.map(s=>s.sym), ...INDEXES.map(s=>s.sym), ...TICKER_STOCKS])];
  const spikes = [];

  for (const sym of trackedSymbols) {
    const q = quotes[sym];
    if (!q || !q.volume) continue;
    const currentVol = q.volume;
    const prevVol = state.lastVolume[sym];
    state.lastVolume[sym] = currentVol;
    if (prevVol == null) continue; // first sample — no delta yet

    let delta = currentVol - prevVol;
    if (delta < 0) delta = currentVol; // session/day rollover — treat as fresh count
    if (delta <= 0) continue;

    if (!state.volDeltas[sym]) state.volDeltas[sym] = [];
    const history = state.volDeltas[sym];

    // Compute baseline from prior samples BEFORE adding the current one
    if (history.length >= 3) {
      const baseline = history.slice(-VOL_BASELINE_SAMPLES).reduce((s,d)=>s+d,0) / Math.min(history.length, VOL_BASELINE_SAMPLES);
      if (baseline > 0 && delta > baseline * VOL_SPIKE_MULTIPLIER) {
        spikes.push({ sym, delta, baseline, multiple: parseFloat((delta/baseline).toFixed(1)), pctChange: q.pctChange });
      }
    }

    history.push(delta);
    if (history.length > VOL_BASELINE_SAMPLES * 2) history.shift();
  }
  return spikes;
}

// ─── Technical Bias Score (momentum indicator — NOT a win-rate guarantee) ────
// Combines short-term price trend slope + magnitude of change into a directional score.
function computeBias(sym, pctChange) {
  const hist = state.history[sym];
  let trendScore = 0;

  if (hist && hist.length >= 3) {
    const recent = hist.slice(-6); // last ~6 samples
    const first = recent[0].p, last = recent[recent.length-1].p;
    const slopePct = first ? ((last - first) / first) * 100 : 0;
    trendScore = slopePct;
  }

  // Blend intraday % change with recent slope, weight toward slope (more responsive)
  const combined = (pctChange * 0.4) + (trendScore * 0.6);
  const score = Math.max(0, Math.min(100, 50 + combined * 12)); // map to 0-100 scale

  let label, cls;
  if (score >= 65) { label = 'BULLISH BIAS'; cls = 'bias-bull'; }
  else if (score <= 35) { label = 'BEARISH BIAS'; cls = 'bias-bear'; }
  else { label = 'NEUTRAL'; cls = 'bias-neutral'; }

  return { label, cls, score: Math.round(score) };
}

const $ = id => document.getElementById(id);

// ─── Clock / Market hours ───────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  $('clock').textContent = now.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'America/New_York'}) + ' ET';
  const day = now.toLocaleDateString('en-US',{weekday:'short',timeZone:'America/New_York'});
  const et = new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
  const h=et.getHours(), m=et.getMinutes();
  const isWeekday = !['Sat','Sun'].includes(day);
  const isOpen = isWeekday && (h>9||(h===9&&m>=30)) && h<16;
  $('market-status').textContent = isOpen ? 'MARKET OPEN' : 'MARKET CLOSED';
  $('market-status').className = isOpen ? 'open' : 'closed';
  $('live-dot').className = isOpen ? 'live-dot' : 'live-dot offline';
}
setInterval(updateClock,1000); updateClock();

// ─── Auth ────────────────────────────────────────────────────────────────────
async function getAccessToken() {
  if (TT_REFRESH_TOKEN === "PASTE_YOUR_REFRESH_TOKEN_HERE") {
    throw new Error("No refresh token configured. Complete the OAuth flow and paste your refresh token into the CONFIG section of this file.");
  }
  const res = await fetch(TT_TOKEN_URL, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({
      grant_type: "refresh_token",
      refresh_token: TT_REFRESH_TOKEN,
      client_id: TT_CLIENT_ID,
      client_secret: TT_CLIENT_SECRET,
    }),
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Auth failed (${res.status}): ${txt.slice(0,200)}`);
  }
  const data = await res.json();
  return data.access_token;
}

// ─── Quotes ──────────────────────────────────────────────────────────────────
async function fetchQuotes(symbols) {
  const url = `${TT_QUOTES_URL}?equity=${symbols.join(',')}`;
  const res = await fetch(url, {
    headers: { "Authorization": `Bearer ${state.accessToken}` },
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Quotes failed (${res.status}): ${txt.slice(0,200)}`);
  }
  const data = await res.json();
  const items = data.data?.items || data.items || [];
  const map = {};
  for (const item of items) {
    const last = parseFloat(item.last || item.close || item.mark || 0);
    const prevClose = parseFloat(item['prev-close'] || item.prevClose || item['closing-price'] || 0);
    const pctChange = prevClose ? ((last - prevClose) / prevClose) * 100 : (item['percent-change'] ? parseFloat(item['percent-change']) : 0);
    map[item.symbol] = { last, pctChange: parseFloat(pctChange.toFixed(2)), volume: item.volume || 0 };
  }
  return map;
}

// ─── Init / Refresh cycle ────────────────────────────────────────────────────
async function init() {
  showLoading('CONNECTING TO TASTYTRADE...');
  try {
    state.accessToken = await getAccessToken();
    await refreshAll();
    hideOverlay();
    resetCountdown();
  } catch (err) {
    showError(err.message);
  }
}

async function refreshAll() {
  const allSymbols = [...new Set([...SECTORS.map(s=>s.sym), ...INDEXES.map(s=>s.sym), ...TICKER_STOCKS])];
  const quotes = await fetchQuotes(allSymbols);
  recordHistory(quotes);
  const spikes = detectVolumeSpikes(quotes);
  spikes.forEach(showVolumeAlert);
  renderIndexStrip(quotes);
  renderTreemap(quotes);
  renderTicker(quotes);
  $('overlay-msg').textContent = '';
}

    }
    for (const sym of TICKER_STOCKS) {
      const pct = (Math.random() - 0.45) * 5;
      const base = _demoCumVolume[sym] || 0;
      const isSpike = Math.random() < 0.05;
      const inc = Math.round((isSpike ? 9 : 1) * (30000 + Math.random()*120000));
      _demoCumVolume[sym] = base + inc;
      quotes[sym] = { last: 20 + Math.random()*600, pctChange: parseFloat(pct.toFixed(2)), volume: _demoCumVolume[sym] };
    }
    recordHistory(quotes);
    const spikes = detectVolumeSpikes(quotes);
    spikes.forEach(showVolumeAlert);

window.startDemo = startDemo;

// ─── Ticker Tape (CNBC-style scrolling stock strip) ──────────────────────────
function renderTicker(quotes) {
  const track = $('ticker-track');
  const items = TICKER_STOCKS.map(sym => {
    const q = quotes[sym] || { last: 0, pctChange: 0 };
    const cls = q.pctChange >= 0 ? 'up' : 'down';

// ─── Index Strip ─────────────────────────────────────────────────────────────
function renderIndexStrip(quotes) {
  const strip = $('index-strip');
  strip.innerHTML = INDEXES.map(idx => {
    const q = quotes[idx.sym] || { last: 0, pctChange: 0 };

}

// ─── Color scale: red (-3%) → gray (0%) → green (+3%) ───────────────────────
// ─── 1-Hour Sparkline (built live from polled price history) ────────────────
function buildSparkline(sym, width, height, isUp) {
  const hist = state.history[sym];
  if (!hist || hist.length < 2) return '';

  const prices = hist.map(pt => pt.p);
  let min = Math.min(...prices), max = Math.max(...prices);
  if (min === max) { min -= 1; max += 1; } // avoid flat-line div-by-zero

  const n = prices.length;
  const points = prices.map((p, i) => {
    const x = (i / (n - 1)) * width;
    const y = height - ((p - min) / (max - min)) * height;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');

  const strokeColor = isUp ? '#00d68f' : '#ff4757';
  const fillColor = isUp ? 'rgba(0,214,143,0.15)' : 'rgba(255,71,87,0.15)';
  const areaPoints = `0,${height} ${points} ${width},${height}`;

  return `<svg class="tile-chart" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
    <polygon points="${areaPoints}" fill="${fillColor}" />
    <polyline points="${points}" fill="none" stroke="${strokeColor}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" />
  </svg>`;
}

function colorForChange(pct) {
  const clamped = Math.max(-3, Math.min(3, pct));
  const t = (clamped + 3) / 6; // 0..1
  let r,g,b;
  if (t < 0.5) {
    const k = t / 0.5;
    r = lerp(0x8b,0x22,k); g = lerp(0x1e,0x22,k); b = lerp(0x2e,0x26,k);
  } else {
    const k = (t - 0.5) / 0.5;
    r = lerp(0x22,0x00,k); g = lerp(0x22,0xd6,k); b = lerp(0x26,0x8f,k);
  }
  return `rgb(${r|0},${g|0},${b|0})`;
}
function lerp(a,b,t){ return a + (b-a)*t; }

// ─── Simple squarified treemap layout ────────────────────────────────────────
function squarify(items, x, y, w, h, out) {
  if (!items.length) return;
  if (items.length === 1) {
    out.push({ ...items[0], x, y, w, h });
    return;
  }
  const total = items.reduce((s,i)=>s+i.value,0);
  let acc = 0, splitIdx = 1;
  const targetRatio = w >= h ? w/h : h/w;
  // Greedy split: find point where row aspect worsens
  let bestScore = Infinity;
  for (let i=1;i<items.length;i++){
    const rowSum = items.slice(0,i).reduce((s,it)=>s+it.value,0);
    const rowFrac = rowSum/total;
    const rowShort = w>=h ? h*rowFrac : w*rowFrac;
    const rowLong  = w>=h ? w : h;
    const rowItems = items.slice(0,i);
    const worst = Math.max(...rowItems.map(it=>{
      const itemLen = (it.value/rowSum) * rowLong;
      const ratio = Math.max(itemLen/rowShort, rowShort/itemLen);
      return ratio;
    }));
    if (worst < bestScore) { bestScore = worst; splitIdx = i; } else break;
  }
  const row = items.slice(0,splitIdx);
  const rest = items.slice(splitIdx);
  const rowSum = row.reduce((s,i)=>s+i.value,0);
  const rowFrac = rowSum/total;

  if (w >= h) {
    const rowW = w*rowFrac;
    let cy=y;
    for (const it of row) {
      const itemH = (it.value/rowSum)*h;
      out.push({...it, x, y:cy, w:rowW, h:itemH});
      cy+=itemH;
    }
    squarify(rest, x+rowW, y, w-rowW, h, out);
  } else {
    const rowH = h*rowFrac;
    let cx=x;
    for (const it of row) {
      const itemW = (it.value/rowSum)*w;
      out.push({...it, x:cx, y, w:itemW, h:rowH});
      cx+=itemW;
    }
    squarify(rest, x, y+rowH, w, h-rowH, out);
  }
}

// ─── Render Treemap ───────────────────────────────────────────────────────────
function renderTreemap(quotes) {
  const container = $('treemap');
  const wrap = $('treemap-wrap');
  const W = wrap.clientWidth - 20;
  const H = wrap.clientHeight - 20;

  const source = state.view === 'sector' ? SECTORS : INDEXES;
  const items = source.map(s => ({
    sym: s.sym, name: s.name,
    value: state.sizeMode === 'weight' ? s.weight : 1,
    quote: quotes[s.sym] || { last:0, pctChange:0, volume:0 },
  })).sort((a,b) => b.value - a.value);

  const laidOut = [];
  squarify(items, 0, 0, W, H, laidOut);

  container.innerHTML = laidOut.map(t => {
    const pct = t.quote.pctChange;
    const bg = colorForChange(pct);
    const sign = pct >= 0 ? '+' : '';
    const fontScale = Math.min(t.w, t.h);
    const symSize = Math.max(11, Math.min(22, fontScale/6));
    const chgSize = Math.max(10, Math.min(18, fontScale/8));
    const showName = t.w > 90 && t.h > 50;
    const showChart = t.w > 80 && t.h > 70;
    const showBias = t.w > 90 && t.h > 85;
    const chartHtml = showChart ? buildSparkline(t.sym, t.w - 20, Math.min(34, t.h * 0.3), pct >= 0) : '';
    const bias = computeBias(t.sym, pct);
    const biasHtml = showBias ? `<div class="tile-bias ${bias.cls}">${bias.label} · ${bias.score}</div>` : '';
    return `<div class="tile"
        style="left:${t.x}px;top:${t.y}px;width:${t.w-2}px;height:${t.h-2}px;background:${bg};"
        data-sym="${t.sym}" data-price="${t.quote.last}" data-pct="${pct}" data-vol="${t.quote.volume}"
        data-bias-label="${bias.label}" data-bias-score="${bias.score}"
        onmouseenter="showTip(event,this)" onmouseleave="hideTip()">
      <div class="tile-sym" style="font-size:${symSize}px">${t.sym}</div>
      <div class="tile-chg" style="font-size:${chgSize}px">${sign}${pct.toFixed(2)}%</div>
      ${showName ? `<div class="tile-name">${t.name}</div>` : ''}
      ${chartHtml}
      ${biasHtml}
    </div>`;
  }).join('');
}

// ─── Tooltip ─────────────────────────────────────────────────────────────────
const tooltip = $('tooltip');
function showTip(e, el) {
  const sym = el.dataset.sym, price = parseFloat(el.dataset.price), pct = parseFloat(el.dataset.pct), vol = parseInt(el.dataset.vol);
  const biasLabel = el.dataset.biasLabel, biasScore = el.dataset.biasScore;
  tooltip.innerHTML = `
    <div class="tt-sym">${sym}</div>
    <div class="tt-row"><span class="tt-label">Price</span><span>$${price.toFixed(2)}</span></div>
    <div class="tt-row"><span class="tt-label">Change</span><span style="color:${pct>=0?'#10d488':'#f04155'}">${pct>=0?'+':''}${pct.toFixed(2)}%</span></div>
    <div class="tt-row"><span class="tt-label">Volume</span><span>${vol.toLocaleString()}</span></div>
    ${biasLabel ? `<div class="tt-row"><span class="tt-label">Signal</span><span>${biasLabel} (${biasScore})</span></div>
    <div style="margin-top:6px;font-size:8px;color:var(--text-muted);line-height:1.4;">Technical momentum score, not a win-rate guarantee.</div>` : ''}`;
  tooltip.style.display='block';
  positionTip(e);
}
function hideTip(){ tooltip.style.display='none'; }

// ─── Volume Spike Alert Popup (bottom-left, CNBC-breaking-news style) ───────
function showVolumeAlert(spike) {
  const container = $('volume-alerts');
  const now = Date.now();
  const id = 'va-' + spike.sym + '-' + now;
  const cls = spike.pctChange >= 0 ? 'up' : 'down';
  const sign = spike.pctChange >= 0 ? '+' : '';
  const el = document.createElement('div');
  el.className = 'vol-alert';
  el.id = id;
  el.innerHTML = `
    <div class="va-icon">⚡</div>
    <div class="va-body">
      <div class="va-title">${spike.sym} <span class="va-mult">${spike.multiple}x</span> VOLUME</div>
      <div class="va-sub">Unusual activity detected · <span class="${cls}">${sign}${spike.pctChange.toFixed(2)}%</span></div>
    </div>
    <button class="va-close" onclick="document.getElementById('${id}').remove()">×</button>`;
  container.prepend(el);

  // Record into rolling history (max 30, newest first)
  state.alertHistory.unshift({ ...spike, t: now });
  if (state.alertHistory.length > 30) state.alertHistory.pop();
  renderAlertHistory();
  $('history-badge').textContent = state.alertHistory.length;
  $('history-badge').style.display = 'flex';

  // Auto-dismiss after 15s
  setTimeout(() => { const e = document.getElementById(id); if (e) { e.classList.add('fade-out'); setTimeout(()=>e.remove(), 300); } }, 15000);

  // Cap stack at 5 visible alerts
  const all = container.querySelectorAll('.vol-alert');
  if (all.length > 5) all[all.length-1].remove();
}

// ─── Alert History Panel ──────────────────────────────────────────────────────
function toggleHistory() {
  state.historyOpen = !state.historyOpen;
  $('history-panel').classList.toggle('open', state.historyOpen);
}
window.toggleHistory = toggleHistory;

function renderAlertHistory() {
  const list = $('history-list');
  if (!state.alertHistory.length) {
    list.innerHTML = `<div class="history-empty">No spikes detected yet this session.</div>`;
    return;
  }
  list.innerHTML = state.alertHistory.map(a => {
    const cls = a.pctChange >= 0 ? 'up' : 'down';
    const sign = a.pctChange >= 0 ? '+' : '';
    return `<div class="history-item">
      <div class="hi-left">
        <span class="hi-sym">${a.sym}</span>
        <span class="hi-mult">${a.multiple}x</span>
      </div>
      <div class="hi-right">
        <span class="hi-pct ${cls}">${sign}${a.pctChange.toFixed(2)}%</span>
        <span class="hi-time">${_timeAgo(a.t)}</span>
      </div>
    </div>`;
  }).join('');
}

function _timeAgo(ts) {
  const secs = Math.floor((Date.now() - ts) / 1000);
  if (secs < 60) return `${secs}s ago`;
  const mins = Math.floor(secs / 60);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  return `${hrs}h ago`;
}
// Refresh relative timestamps in the history panel every 10s while open
setInterval(() => { if (state.historyOpen) renderAlertHistory(); }, 10000);

function positionTip(e){
  const x=e.clientX+12, y=e.clientY-20;
  tooltip.style.left = (x+tooltip.offsetWidth>window.innerWidth ? x-tooltip.offsetWidth-24 : x)+'px';
  tooltip.style.top = Math.max(0,y)+'px';
}
document.addEventListener('mousemove', e => { if(tooltip.style.display!=='none') positionTip(e); });
window.showTip = showTip; window.hideTip = hideTip;

// ─── UI States ───────────────────────────────────────────────────────────────
function showLoading(msg){ $('overlay').classList.remove('hidden'); $('spinner').style.display='block'; $('overlay-msg').textContent=msg; $('error-box').style.display='none'; }
function showError(msg){ $('overlay').classList.remove('hidden'); $('spinner').style.display='none'; $('overlay-msg').textContent=''; $('error-box').style.display='block'; $('error-detail').textContent=msg; }
function hideOverlay(){ $('overlay').classList.add('hidden'); }
window.init = init;

// ─── Controls ────────────────────────────────────────────────────────────────
document.querySelectorAll('.ctrl-btn[data-view]').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.ctrl-btn[data-view]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.view = btn.dataset.view;
    if (state.lastQuotes) renderTreemap(state.lastQuotes);
    else refreshOrDemo();
  });
});
document.querySelectorAll('.ctrl-btn[data-size]').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.ctrl-btn[data-size]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.sizeMode = btn.dataset.size;
    if (state.lastQuotes) renderTreemap(state.lastQuotes);
  });
});
document.querySelectorAll('.ctrl-btn[data-interval]').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.ctrl-btn[data-interval]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.intervalSeconds = parseInt(btn.dataset.interval);
    resetCountdown();
  });
});
$('refresh-btn').addEventListener('click', () => state.demo ? null : refreshAll().catch(e=>showError(e.message)));

function refreshOrDemo(){ state.demo ? null : refreshAll().catch(e=>showError(e.message)); }

// ─── Countdown / Auto-refresh ────────────────────────────────────────────────
function resetCountdown() {
  clearInterval(state.countdownTimer);
  state.countdown = state.intervalSeconds;
  updateCountdown();
  state.countdownTimer = setInterval(()=>{
    state.countdown--;
    updateCountdown();
    if (state.countdown<=0) {
      state.countdown = state.intervalSeconds;
      if (!state.demo) refreshAll().catch(e=>showError(e.message));
    }
  },1000);
}
function updateCountdown(){ $('countdown').textContent = `Refresh in ${state.countdown}s`; }

// Store last quotes for view switching
const _origRenderTreemap = renderTreemap;
renderTreemap = function(quotes){ state.lastQuotes = quotes; _origRenderTreemap(quotes); };

window.addEventListener('resize', () => { if (state.lastQuotes) renderTreemap(state.lastQuotes); });

// ─── Boot ────────────────────────────────────────────────────────────────────
init();
</script>
